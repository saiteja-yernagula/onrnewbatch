<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            display:grid;
            grid-template-columns:1fr 1fr 1fr;
            gap:20px;
        }
        img{
            width:100%;
            height:350px;
        }
        #container>div{
            padding:20px;
            box-shadow:0px 0px 3px 0px black;
        }
    </style>
</head>
<body>

    <div id="container"></div>
    <script>
async function getapidata(){
    let data=await fetch('https://fakestoreapi.com/products')
    let apidata=await data.json()
    let container=document.getElementById('container')
    for (i of apidata){
        container.innerHTML+=`
        <div>
         <div><img src=${i.image}></div>
         <h3>${i.title}</h3>
         <p>${i.price}</p>
         <p>${i.category}</p>
        </div>
        `
    }}
getapidata()

let onrstd=localStorage.getItem('onrstd')
console.log(onrstd)



    </script>
</body>
</html>
