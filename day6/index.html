        it is a one dimensional layout model that is used to create
        different layouts

        a) parent properties - flexcontainer properties
        1) display:flex;
        it will create flex container and it changes the flex items
        direction into row

        .parent{
        display:flex;
        }

        2) flex-direction
        it is used to change the flex items direction
        .parent{
        display:flex;
        flex-direction:column-reverse;
        flex-direction:row-reverse;
        flex-direction:row;
        flex-direction:column;
        }

        3) justify-content
        it is used to control the child items on main axis -x axis
           .parent{
        display:flex;
         justify-content:center;
        justify-content:right;
        justify-content:left;
        justify-content:space-evenly;
        justify-content:space-around;
        justify-content:space-between;

        }

    4) align items
     it is used to control the child items on cross axis

.parent{
display:flex;
     align-items:stretch;
        align-items:center;
        align-items:end;
        align-items:start;
        }}

    5) flexwrap
    to creaate mutliple rows

    .parent{

    flex-wrap:wrap;

        *{
