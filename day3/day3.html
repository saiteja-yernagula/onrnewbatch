    forms
    forms are used to collect the information from the user
    and allowing user to submit data to the server

    forms used in registrations,signup,signin 
    forms are defined with form tag
  <form>

  </form>
  form attributes
  actions- 
  it specifies where the data should be submmited

  method
  it specifies how data should be transfered
  method='get'
  method='post'

  fields are defined with input tag
    <input type="text">
  
    types controls the input tag
    text
    password
    email

    label tag 
    it is used to provide information about an input field


    attibutes
    1) placeholder
    it provides the hint to the user inside a field

    2) required
    it specifies the field must contain something to submit

    3) name 
    it carries the value to the backend and provides key

    4) value
    it provides the predefined value to a field

    5) for and id
    it connect label with the input


    -->
